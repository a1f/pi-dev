# pi-dev container — invoked by scripts/spawn.sh. spawn.sh sets:
#   HOST_PI_DEV         absolute path to host's pi-dev checkout
#   HOST_WORKTREES_DIR  absolute path to ../pi-dev-worktrees
#   WORKTREE_NAME       branch name (sanitized)
#   PI_UID / PI_GID     for file-ownership matching
#   PI_DISABLE_FIREWALL only set to 1 when spawn.sh saw `--no-firewall`
#
# Run via:
#   ./scripts/spawn.sh <branch> --docker
# not via raw `docker compose run` — spawn.sh sets the required env.

services:
  pi:
    build:
      context: .
      args:
        UID: "${PI_UID:-501}"
        GID: "${PI_GID:-20}"
    image: pi-dev:local
    # Stable hostname so `hostname` (and pi's status line) clearly says
    # "you're in the container" instead of a random container-id hex string.
    hostname: pi-dev
    # No `user:` here — the container starts as root so the entrypoint can
    # apply iptables rules, then uses `gosu` to drop to the pi user before
    # exec'ing the actual command. Capabilities don't survive the user switch.

    # --- safety primitives ---------------------------------------------------
    # Root fs is read-only; the agent can only write to tmpfs mounts and to
    # /workspace (which is the worktree bind-mount). The container is the
    # security boundary, so pi can run in "yolo" mode safely.
    read_only: true
    cap_drop:
      - ALL
    # Capabilities needed only by the root-side entrypoint:
    #   NET_ADMIN, NET_RAW  — install the iptables egress allowlist
    #   SETUID, SETGID      — let `gosu` switch root → pi before exec'ing pi
    # All four are dropped by the kernel when gosu calls setuid(), so the pi
    # process itself runs with no capabilities at all.
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 4g
    cpus: 2.0
    init: true

    # IPv6 fully disabled inside the container. The firewall only manages
    # IPv4 (ipset family inet); without disabling v6 the agent could reach
    # any AAAA-bearing host straight through the v6 stack.
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "1"
      net.ipv6.conf.default.disable_ipv6: "1"
      net.ipv6.conf.lo.disable_ipv6: "1"

    # Writable tmpfs for anywhere pi might want to write outside the worktree
    # and outside ~/.pi (which is bind-mounted from host). Sized small to bound
    # runaway disk usage. Everything in tmpfs vanishes on exit.
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /home/pi/.cache:size=256m,uid=${PI_UID:-501},gid=${PI_GID:-20},mode=0755
      - /home/pi/.npm:size=128m,uid=${PI_UID:-501},gid=${PI_GID:-20},mode=0755

    environment:
      # Provider API keys — pulled from host .env (loaded by spawn.sh).
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      # Reserved for future PR-flavored skills; unused by initial scaffold.
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      # Make pi/git happier when the parent shell isn't a TTY.
      TERM: "${TERM:-xterm-256color}"
      # Set by spawn.sh ONLY when --no-firewall was passed. Don't inherit
      # silently from the operator's shell — spawn.sh forces this to "0"
      # otherwise so the container env never sees an inherited "1".
      PI_DISABLE_FIREWALL: "${PI_DISABLE_FIREWALL:-0}"

    volumes:
      # Two scoped bind mounts at MATCHING absolute paths so worktree .git
      # gitdir pointers (absolute references to .git/worktrees/<name>) resolve
      # naturally. Important: we do NOT mount the entire ${HOME}/dev tree;
      # the agent only sees pi-dev and pi-dev-worktrees, not sibling repos.
      - "${HOST_PI_DEV:?HOST_PI_DEV must be set by spawn.sh}:${HOST_PI_DEV}:rw"
      - "${HOST_WORKTREES_DIR:?HOST_WORKTREES_DIR must be set by spawn.sh}:${HOST_WORKTREES_DIR}:rw"

      # Host gitconfig so commits get the right author identity. Read-only so
      # the agent can't rewrite global git settings. (Worktree-local config
      # is still writable; spawn.sh/reap.sh neutralize hookspath there.)
      - "${HOME}/.gitconfig:/home/pi/.gitconfig:ro"

      # Host ~/.pi mounted RW so OAuth token refresh and session writes work
      # (~/.pi/agent/auth.json and ~/.pi/agent/sessions/ are runtime state).
      - "${HOME}/.pi:/home/pi/.pi:rw"
      # Three paths the agent could weaponize get overlaid RO on top:
      #   skills/       — loadable code paths (per /skill:name invocation)
      #   extensions/   — TS code loaded at session start
      #   settings.json — provider config; agent could otherwise add a fake
      #                   provider with baseURL=https://attacker and the
      #                   operator's next host-mode pi run would silently
      #                   exfil every prompt + the host's API keys.
      # spawn.sh ensures all three mount sources exist before launch.
      - "${HOME}/.pi/agent/skills:/home/pi/.pi/agent/skills:ro"
      - "${HOME}/.pi/agent/extensions:/home/pi/.pi/agent/extensions:ro"
      - "${HOME}/.pi/agent/settings.json:/home/pi/.pi/agent/settings.json:ro"

    # Drop the agent into the worktree, not the image's default WORKDIR.
    working_dir: "${HOST_WORKTREES_DIR}/${WORKTREE_NAME:?WORKTREE_NAME must be set by spawn.sh}"

    stdin_open: true
    tty: true

    command: ["pi"]
